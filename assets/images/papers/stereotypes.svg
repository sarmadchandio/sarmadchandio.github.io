<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="240" fill="#fdf6e3"/>
  <!-- word cloud / text fragments arranged -->
  <g font-family="Playfair Display, serif" fill="#073642">
    <text x="50" y="80" font-size="22" font-weight="700" opacity="0.95">gender</text>
    <text x="160" y="65" font-size="28" font-weight="700" fill="#cb4b16">norm</text>
    <text x="260" y="85" font-size="18" font-weight="600" opacity="0.7">nation</text>
    <text x="40" y="130" font-size="16" opacity="0.6" font-style="italic">ethnicity</text>
    <text x="140" y="130" font-size="32" font-weight="700">bias</text>
    <text x="240" y="130" font-size="18" opacity="0.8">language</text>
    <text x="70" y="175" font-size="18" opacity="0.75">taboo</text>
    <text x="160" y="185" font-size="22" font-weight="700" fill="#cb4b16">text</text>
    <text x="240" y="175" font-size="16" opacity="0.6" font-style="italic">implicit</text>
  </g>
  <!-- underline accent -->
  <line x1="160" y1="68" x2="235" y2="68" stroke="#cb4b16" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="133" x2="200" y2="133" stroke="#cb4b16" stroke-width="2" opacity="0.5"/>
  <!-- grain -->
  <g fill="#cb4b16" opacity="0.4">
    <circle cx="30" cy="40" r="1.5"/><circle cx="330" cy="40" r="1.5"/>
    <circle cx="30" cy="210" r="1.5"/><circle cx="330" cy="210" r="1.5"/>
  </g>
</svg>
