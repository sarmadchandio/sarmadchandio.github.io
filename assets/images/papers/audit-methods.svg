<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="240" fill="#fdf6e3"/>
  <!-- two diverging audit outcomes -->
  <g stroke="#073642" stroke-width="1.5" fill="none">
    <path d="M 180 50 L 80 190"/>
    <path d="M 180 50 L 280 190"/>
    <circle cx="180" cy="50" r="10" fill="#073642"/>
  </g>
  <!-- left leaning result -->
  <g>
    <rect x="30" y="175" width="100" height="50" rx="4" fill="#cb4b16" opacity="0.85"/>
    <text x="80" y="200" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" fill="#fdf6e3" font-weight="600">LEFT-LEANING</text>
    <text x="80" y="215" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="10" fill="#fdf6e3">Audit A</text>
  </g>
  <!-- right leaning result -->
  <g>
    <rect x="230" y="175" width="100" height="50" rx="4" fill="#073642"/>
    <text x="280" y="200" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" fill="#fdf6e3" font-weight="600">RIGHT-LEANING</text>
    <text x="280" y="215" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="10" fill="#fdf6e3">Audit B</text>
  </g>
  <!-- question mark at top -->
  <text x="180" y="35" text-anchor="middle" font-family="Playfair Display, serif" font-size="26" font-weight="700" fill="#cb4b16">?</text>
  <!-- label -->
  <text x="180" y="115" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" fill="#586e75" font-style="italic">same system, different designs</text>
</svg>
